<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">⚡</div>
    <h1>TaskManager</h1>
    <p class="auth-subtitle">Inicia sesión para continuar</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="tu@email.com">
        <span class="error" *ngIf="f['email'].invalid && f['email'].touched">Email inválido</span>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" formControlName="password" placeholder="••••••">
        <span class="error" *ngIf="f['password'].invalid && f['password'].touched">Mínimo 6 caracteres</span>
      </div>

      <div class="submit-error" *ngIf="error">⚠️ {{ error }}</div>

      <button type="submit" class="btn-primary btn-full" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>
    </form>

    <p class="auth-switch">
      ¿No tienes cuenta? <a routerLink="/auth/register">Regístrate</a>
    </p>

    <div class="demo-hint">
      <strong>Demo:</strong>  felizardo&#64;@demo.com / 123456
    </div>
  </div>
</div>
