<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">⚡</div>
    <h1>Crear cuenta</h1>
    <p class="auth-subtitle">Únete a TaskManager</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">

      <div class="form-group">
        <label>Nombre</label>
        <input formControlName="name" placeholder="Tu nombre">
        <span class="error" *ngIf="f['name'].invalid && f['name'].touched">Mínimo 2 caracteres</span>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="tu@email.com">
        <span class="error" *ngIf="f['email'].invalid && f['email'].touched">Email inválido</span>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" formControlName="password" placeholder="••••••">
        <span class="error" *ngIf="f['password'].invalid && f['password'].touched">Mínimo 6 caracteres</span>
      </div>

      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input type="password" formControlName="confirmPassword" placeholder="••••••">
        <span class="error" *ngIf="form.errors?.['mismatch'] && f['confirmPassword'].touched">
          Las contraseñas no coinciden
        </span>
      </div>

      <div class="submit-error" *ngIf="error">⚠️ {{ error }}</div>

      <button type="submit" class="btn-primary btn-full" [disabled]="loading">
        {{ loading ? 'Creando cuenta...' : 'Registrarse' }}
      </button>
    </form>

    <p class="auth-switch">
      ¿Ya tienes cuenta? <a routerLink="/auth/login">Inicia sesión</a>
    </p>
  </div>
</div>
