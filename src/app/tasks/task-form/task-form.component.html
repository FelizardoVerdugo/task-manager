<div class="form-container">
  <a routerLink="/tasks" class="back-link">← Cancelar</a>
  <h1>{{ isEdit ? 'Editar Tarea' : 'Nueva Tarea' }}</h1>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="task-form">

    <!-- Título -->
    <div class="form-group">
      <label>Título *</label>
      <input formControlName="title" placeholder="Ej: Revisar pull requests">
      <div class="errors" *ngIf="f['title'].invalid && f['title'].touched">
        <span *ngIf="f['title'].errors?.['required']">El título es obligatorio</span>
        <span *ngIf="f['title'].errors?.['minlength']">Mínimo 3 caracteres</span>
        <span *ngIf="f['title'].errors?.['maxlength']">Máximo 80 caracteres</span>
      </div>
    </div>

    <!-- Descripción -->
    <div class="form-group">
      <label>Descripción *</label>
      <textarea formControlName="description" rows="3" placeholder="Describe la tarea..."></textarea>
      <div class="errors" *ngIf="f['description'].invalid && f['description'].touched">
        <span *ngIf="f['description'].errors?.['required']">La descripción es obligatoria</span>
        <span *ngIf="f['description'].errors?.['minlength']">Mínimo 10 caracteres</span>
      </div>
    </div>

    <!-- Categoría y Prioridad -->
    <div class="form-row">
      <div class="form-group">
        <label>Categoría</label>
        <select formControlName="category">
          <option *ngFor="let c of categories" [value]="c">{{c}}</option>
        </select>
      </div>
      <div class="form-group">
        <label>Prioridad</label>
        <select formControlName="priority">
          <option *ngFor="let p of priorities" [value]="p">{{p}}</option>
        </select>
      </div>
    </div>

    <!-- Estado y Fecha -->
    <div class="form-row">
      <div class="form-group">
        <label>Estado</label>
        <select formControlName="status">
          <option *ngFor="let s of statuses" [value]="s">{{s}}</option>
        </select>
      </div>
      <div class="form-group">
        <label>Fecha límite *</label>
        <input type="date" formControlName="dueDate">
        <div class="errors" *ngIf="f['dueDate'].invalid && f['dueDate'].touched">
          <span>La fecha es obligatoria</span>
        </div>
      </div>
    </div>

    <!-- Error global -->
    <div class="submit-error" *ngIf="submitError">⚠️ {{ submitError }}</div>

    <button type="submit" class="btn-primary" [disabled]="submitting">
      {{ submitting ? 'Guardando...' : (isEdit ? 'Guardar cambios' : 'Crear tarea') }}
    </button>

  </form>
</div>
